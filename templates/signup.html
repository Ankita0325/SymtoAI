<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SymtoAI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #EFF6FF; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .card { display: flex; border-radius: 20px; overflow: hidden; background: #fff; box-shadow: 0 20px 60px rgba(37,99,235,0.12); max-width: 860px; width: 100%; min-height: 520px; }
        .left-panel { background: #2563EB; width: 45%; padding: 40px 36px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden; }
        .hex-bg { position: absolute; top: 0; right: -20px; bottom: 0; display: flex; flex-direction: column; gap: 10px; justify-content: center; opacity: 0.12; pointer-events: none; }
        .left-panel h2 { font-size: 28px; font-weight: 700; color: #fff; line-height: 1.3; position: relative; z-index: 1; }
        .logo-chip { display: flex; align-items: center; gap: 10px; position: relative; z-index: 1; }
        .logo-icon { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .logo-icon svg { width: 22px; height: 22px; }
        .logo-chip span { color: rgba(255,255,255,0.95); font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
        .screen-mock { background: #fff; border-radius: 10px; padding: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); margin-top: 20px; position: relative; z-index: 1; }
        .screen-dots { display: flex; gap: 4px; margin-bottom: 8px; }
        .screen-dots span { width: 6px; height: 6px; border-radius: 50%; }
        .screen-body { display: flex; gap: 8px; }
        .ss { width: 30%; display: flex; flex-direction: column; gap: 5px; }
        .ss-av { width: 22px; height: 22px; border-radius: 50%; background: #60a5fa; margin-bottom: 3px; }
        .sl { height: 5px; border-radius: 3px; background: #e2e8f0; }
        .sm { flex: 1; }
        .sm-b { height: 4px; border-radius: 2px; background: #e2e8f0; margin-bottom: 5px; }
        .sm-b.blue { background: #3b82f6; width: 55%; }
        .sm-chart { background: #eff6ff; border-radius: 6px; height: 44px; display: flex; align-items: flex-end; gap: 3px; padding: 6px; margin-top: 5px; }
        .b { border-radius: 2px 2px 0 0; background: #3b82f6; }
        .figure { display: flex; align-items: flex-end; gap: 10px; margin-top: 18px; position: relative; z-index: 1; }
        .fig-person { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .fig-head { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.35); }
        .fig-body { width: 22px; height: 40px; background: rgba(255,255,255,0.25); border-radius: 8px 8px 0 0; }
        .fig-plant { display: flex; flex-direction: column; align-items: center; }
        .fig-leaf { width: 12px; height: 12px; border-radius: 0 50% 50% 0; background: rgba(255,255,255,0.3); }
        .fig-stem { width: 3px; height: 20px; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .right-panel { flex: 1; padding: 44px 40px; display: flex; flex-direction: column; justify-content: center; }
        .right-panel h3 { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 24px; }
        .field { margin-bottom: 14px; }
        .field input { width: 100%; padding: 11px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; color: #334155; background: #f8fafc; outline: none; transition: border 0.15s, box-shadow 0.15s; }
        .field input:focus { border-color: #2563EB; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); background: #fff; }
        .field input::placeholder { color: #94a3b8; }
        .terms { font-size: 12px; color: #64748b; margin: 8px 0 18px; line-height: 1.6; }
        .terms a { color: #2563EB; text-decoration: none; }
        .btn-get-started { width: 100%; padding: 12px; background: #2563EB; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; letter-spacing: 0.01em; }
        .btn-get-started:hover { background: #1d4ed8; }
        .login-row { margin-top: 18px; text-align: center; font-size: 13px; color: #64748b; }
        .login-row a { color: #2563EB; font-weight: 600; text-decoration: none; }
        #signup-error { display: none; color: #dc2626; font-size: 12px; margin-bottom: 10px; }
        #signup-success { display: none; color: #16a34a; font-size: 13px; text-align: center; margin-bottom: 10px; }
        @media (max-width: 640px) { .left-panel { display: none; } .card { border-radius: 12px; } .right-panel { padding: 32px 24px; } }
    </style>
</head>
<body>
    <div class="card">
        <!-- Left illustrated panel -->
        <div class="left-panel">
            <div class="logo-chip">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="white">
                        <!-- Stethoscope -->
                        <path d="M12 4C8.13 4 5 7.13 5 11v1H4c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h1v2c0 1.1.9 2 2 2h2c1.1 0 2-.9 2-2v-2c0-1.1-.9-2-2-2H7v-2c0-2.76 2.24-5 5-5s5 2.24 5 5v2h-2c-1.1 0-2 .9-2 2v2c0 1.1.9 2 2 2h2c1.1 0 2-.9 2-2v-2h1c1.1 0 2-.9 2-2v-2c0-1.1-.9-2-2-2h-1v-1c0-3.87-3.13-7-7-7z"/>
                        <circle cx="17" cy="16" r="2" fill="none" stroke="white" stroke-width="1.5"/>
                        <path d="M17 14c1.1 0 2 .9 2 2s-.9 2-2 2" stroke="white" stroke-width="1.5" fill="none"/>
                    </svg>
                </div>
                <span>SymtoAI</span>
            </div>

            <div>
                <div class="screen-mock">
                    <div class="screen-dots">
                        <span style="background:#f87171"></span>
                        <span style="background:#fbbf24"></span>
                        <span style="background:#34d399"></span>
                    </div>
                    <div class="screen-body">
                        <div class="ss">
                            <div class="ss-av"></div>
                            <div class="sl" style="width:70%"></div>
                            <div class="sl" style="width:50%"></div>
                            <div class="sl" style="width:80%;margin-top:6px"></div>
                            <div class="sl" style="width:40%"></div>
                        </div>
                        <div class="sm">
                            <div class="sm-b blue"></div>
                            <div class="sm-b" style="width:80%"></div>
                            <div class="sm-b" style="width:90%"></div>
                            <div class="sm-chart">
                                <div class="b" style="height:70%;width:10px"></div>
                                <div class="b" style="height:50%;width:10px;opacity:.7"></div>
                                <div class="b" style="height:90%;width:10px"></div>
                                <div class="b" style="height:40%;width:10px;opacity:.6"></div>
                                <div class="b" style="height:75%;width:10px"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="figure">
                    <div class="fig-person">
                        <div class="fig-head"></div>
                        <div class="fig-body"></div>
                    </div>
                    <div class="fig-plant">
                        <div class="fig-leaf"></div>
                        <div class="fig-stem"></div>
                    </div>
                </div>
            </div>

            <h2>One click to go<br>all digital.</h2>

            <!-- Hex background decoration -->
            <div class="hex-bg" aria-hidden="true">
                <svg width="120" height="420" viewBox="0 0 120 420">
                    <polygon points="60,10 100,32 100,78 60,100 20,78 20,32" fill="white"/>
                    <polygon points="60,115 100,137 100,183 60,205 20,183 20,137" fill="white"/>
                    <polygon points="60,220 100,242 100,288 60,310 20,288 20,242" fill="white"/>
                    <polygon points="60,325 100,347 100,393 60,415 20,393 20,347" fill="white"/>
                </svg>
            </div>
        </div>

        <!-- Right form panel -->
        <div class="right-panel">
            <h3>Sign up</h3>

            <form id="signup-form">
                <div class="field">
                    <input type="text" id="username" placeholder="Username" required>
                </div>
                <div class="field">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="field">
                    <input type="password" id="password" placeholder="Password (min 6 chars)" required>
                </div>
                <div class="field">
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                </div>

                <p class="terms">
                    You are agreeing to the <a href="#">Terms of Services</a><br>
                    and <a href="#">Privacy Policy</a>
                </p>

                <div id="signup-error"></div>
                <div id="signup-success"></div>

                <button type="submit" class="btn-get-started">Get Started</button>
            </form>

            <div class="login-row">
                Already a member? <a href="/login">Login</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('signup-error');
            const successDiv = document.getElementById('signup-success');

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';

            if (!username || username.length < 3) { errorDiv.textContent = 'Username must be at least 3 characters'; errorDiv.style.display = 'block'; return; }
            if (!email || !email.includes('@')) { errorDiv.textContent = 'Please enter a valid email address'; errorDiv.style.display = 'block'; return; }
            if (!password || password.length < 6) { errorDiv.textContent = 'Password must be at least 6 characters'; errorDiv.style.display = 'block'; return; }
            if (password !== confirmPassword) { errorDiv.textContent = 'Passwords do not match'; errorDiv.style.display = 'block'; return; }

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();
                if (data.success) {
                    successDiv.textContent = '✅ ' + data.message;
                    successDiv.style.display = 'block';
                    setTimeout(() => { window.location.href = '/login'; }, 2000);
                } else {
                    errorDiv.textContent = '❌ ' + data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = '❌ Connection error. Please try again.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
